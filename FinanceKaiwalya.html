<!DOCTYPE html>
<html>
<head>

<title>Finance Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

.container{
max-width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#28a745;
color:white;
border:none;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1e7e34;
}

</style>

</head>

<body>

<div class="container">

<h2>Transaction Entry</h2>

<form id="transactionForm">

<label>Date</label>
<input type="date" id="date" required>

<label>Transaction Type</label>

<select id="transactionType" required>

<option value="">Select</option>
<option>Income</option>
<option>Expense</option>
<option>Self Transfer</option>
<option>Receivable (Money Lent)</option>
<option>Payable (Money Owed)</option>
<option>EMI Payment</option>
<option>Credit Card Payment</option>

</select>

<button type="submit">Submit</button>

</form>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbywPW8hrfem5Xq8InNK9aN_8BZzbty5FOkJpTnkbP0zZ6EReTWYPQSxZHffjiSEEPFE/exec";

document.getElementById("transactionForm").addEventListener("submit", function(e){

e.preventDefault();

const date = document.getElementById("date").value;
const type = document.getElementById("transactionType").value;

if(!date || !type){
alert("Please fill all fields");
return;
}

navigator.geolocation.getCurrentPosition(function(position){

const latitude = position.coords.latitude;
const longitude = position.coords.longitude;

const payload = {
date: date,
time: new Date().toLocaleTimeString(),
location: latitude + "," + longitude,
latitude: latitude,
longitude: longitude,
transactionType: type
};

fetch(scriptURL, {
method: "POST",
mode: "no-cors",
body: JSON.stringify(payload)
})
.then(() => {

alert("Transaction Saved Successfully ✅");

document.getElementById("transactionForm").reset();

})
.catch(error => {

alert("Submission Failed ❌");

console.error(error);

});

},
function(){

alert("Please allow location access");

});

});

</script>

</body>
</html>
