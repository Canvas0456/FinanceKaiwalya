<!DOCTYPE html>
<html>

<head>

<title>Finance Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

input,select,textarea,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

button:disabled{
background:#999;
}

.hidden{
display:none;
}

#status{
margin-top:10px;
text-align:center;
font-size:14px;
}

#version{
margin-top:15px;
font-size:12px;
text-align:center;
color:#777;
}

</style>

</head>

<body>

<div class="container">

<h2>Transaction Entry</h2>

<form id="transactionForm">

<label>Date</label>
<input type="date" id="date" required>

<label>Transaction Type</label>

<select id="transactionType" required>

<option value="">Select</option>
<option>Income</option>
<option>Expense</option>
<option>Self Transfer</option>
<option>Receivable</option>
<option>Payable</option>
<option>EMI Payment</option>
<option>Credit Card Payment</option>

</select>


<!-- INCOME SECTION -->

<div id="incomeSection" class="hidden">

<label>Income Category</label>

<select id="incomeCategory">

<option value="">Select Category</option>
<option>Primary Income</option>
<option>Investment Income</option>
<option>Cashback/Rewards</option>
<option>Gifts / Unexpected Income</option>

</select>


<label>Income Amount (INR)</label>
<input type="number" id="incomeAmount" min="1" step="0.01">


<label>Mode of Transaction</label>

<select id="incomeMode">

<option value="">Select Mode</option>
<option>UPI</option>
<option>Cash</option>
<option>Bank Transfer</option>

</select>


<label>Credited To</label>

<select id="creditedTo">

<option value="">Select</option>
<option>SBI Bank</option>
<option>Jupiter Bank</option>
<option>HDFC Bank</option>
<option>Kotak Bank</option>
<option>Digital Wallet</option>
<option>Cash Account</option>

</select>


<div id="walletDescription" class="hidden">

<label>Wallet Name</label>
<textarea id="incomeDescription"></textarea>

</div>

</div>


<!-- EXPENSE SECTION -->

<div id="expenseSection" class="hidden">

<label>Expense Category</label>

<select id="expenseCategory">

<option value="">Select Category</option>
<option>Housing / Living</option>
<option>Food & Groceries</option>
<option>Transportation</option>
<option>Health & Medical</option>
<option>Shopping / Lifestyle</option>
<option>Entertainment</option>
<option>Education / Learning</option>
<option>Family Support</option>
<option>Travel</option>
<option>Business / Work Expenses</option>
<option>Miscellaneous</option>

</select>


<label>Expense Sub-Category</label>
<select id="expenseSubCategory"></select>


<label>Amount (INR)</label>
<input type="number" id="expenseAmount" min="1">


<label>Mode of Transaction</label>

<select id="expenseMode">

<option value="">Select</option>
<option>Bank Transfer</option>
<option>Cash</option>
<option>Debit Card</option>
<option>Credit Card</option>

</select>


<label>Debited From</label>
<select id="expenseAccount"></select>


<label>Additional Description</label>
<textarea id="expenseDescription"></textarea>

</div>


<button id="submitBtn" type="submit">Submit Transaction</button>

<div id="status"></div>

</form>


<div id="version">

Last Updated: 11 Mar 2026  
<br>
Page Loaded: <span id="loadTime"></span>

</div>

</div>


<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbywPW8hrfem5Xq8InNK9aN_8BZzbty5FOkJpTnkbP0zZ6EReTWYPQSxZHffjiSEEPFE/exec";

const form = document.getElementById("transactionForm");
const typeSelect = document.getElementById("transactionType");

const incomeSection = document.getElementById("incomeSection");
const expenseSection = document.getElementById("expenseSection");

const walletSection = document.getElementById("walletDescription");

let locked=false;


/* SHOW SECTIONS */

typeSelect.addEventListener("change",function(){

incomeSection.classList.add("hidden");
expenseSection.classList.add("hidden");

if(this.value==="Income"){
incomeSection.classList.remove("hidden");
}

if(this.value==="Expense"){
expenseSection.classList.remove("hidden");
}

});


/* WALLET DESCRIPTION RULE */

document.getElementById("creditedTo")
.addEventListener("change",function(){

if(this.value==="Digital Wallet"){

walletSection.classList.remove("hidden");

}else{

walletSection.classList.add("hidden");

}

});


/* EXPENSE CATEGORY MAP */

const expenseMap={

"Housing / Living":[
"Rent","Maintenance","Electricity Bill","Water Bill",
"Gas Cylinder","Internet / Broadband","Mobile Recharge",
"House Repairs","Furniture"
],

"Food & Groceries":[
"Groceries","Fruits & Vegetables","Dairy Products",
"Snacks","Dining Out","Online Food Orders"
],

"Transportation":[
"Fuel / Petrol","Public Transport","Cab / Auto",
"Bike Maintenance","Car Maintenance",
"Parking Charges","Toll Charges"
],

"Health & Medical":[
"Doctor Consultation","Medicines","Medical Tests",
"Health Insurance","Supplements / Vitamins","Gym / Fitness"
],

"Shopping / Lifestyle":[
"Clothes","Shoes","Accessories","Electronics",
"Personal Care","Salon / Grooming"
],

"Entertainment":[
"Movies","OTT Subscriptions","Music Subscription",
"Games","Outings","Events / Concerts"
],

"Education / Learning":[
"Courses","Books","Certifications",
"Workshops","Software Subscriptions"
],

"Family Support":[
"Parents Support","Brother / Sister Support",
"Household Contribution","Gifts for Family"
],

"Travel":[
"Flight Tickets","Train Tickets","Hotel Booking",
"Local Transport","Trip Activities"
],

"Business / Work Expenses":[
"Office Supplies","Work Software","Internet for Work",
"Marketing","Business Expenses"
],

"Miscellaneous":[
"Donations","Penalties","Tips","Unexpected Expenses"
]

};


document.getElementById("expenseCategory")
.addEventListener("change",function(){

const sub=document.getElementById("expenseSubCategory");

sub.innerHTML="";

expenseMap[this.value].forEach(item=>{

let option=document.createElement("option");

option.text=item;

sub.add(option);

});

});


/* MODE BASED ACCOUNT RULE */

document.getElementById("expenseMode")
.addEventListener("change",function(){

const account=document.getElementById("expenseAccount");

account.innerHTML="";

if(this.value==="Bank Transfer" || this.value==="Debit Card"){

["SBI Bank","Jupiter Bank","HDFC Bank","Kotak Bank","Cash"]
.forEach(a=>{

let o=document.createElement("option");

o.text=a;

account.add(o);

});

}

if(this.value==="Cash"){

let o=document.createElement("option");

o.text="Cash";

account.add(o);

}

if(this.value==="Credit Card"){

["Kotak Dream CC","Suryoday Bank Credit Card","PhonePe Wish Card"]
.forEach(a=>{

let o=document.createElement("option");

o.text=a;

account.add(o);

});

}

});


/* SUBMIT */

form.addEventListener("submit",function(e){

e.preventDefault();

if(locked) return;

locked=true;

document.getElementById("submitBtn").disabled=true;

document.getElementById("status").innerHTML="Saving...";

navigator.geolocation.getCurrentPosition(function(position){

const payload={

date:document.getElementById("date").value,

transactionType:typeSelect.value,

incomeCategory:document.getElementById("incomeCategory").value,
amount:document.getElementById("incomeAmount").value,

expenseCategory:document.getElementById("expenseCategory").value,
expenseSubCategory:document.getElementById("expenseSubCategory").value,
expenseAmount:document.getElementById("expenseAmount").value,

mode:document.getElementById("expenseMode").value || document.getElementById("incomeMode").value,

account:document.getElementById("expenseAccount").value || document.getElementById("creditedTo").value,

description:document.getElementById("expenseDescription").value || document.getElementById("incomeDescription").value,

latitude:position.coords.latitude,
longitude:position.coords.longitude,

time:new Date().toLocaleTimeString()

};

fetch(scriptURL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify(payload)
});

form.reset();

document.getElementById("status").innerHTML="✅ Transaction Saved";

});

});


document.getElementById("loadTime").innerText=
new Date().toLocaleString();

</script>

</body>
</html>
