<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow | Pro Entry</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>
    
    <style>
        :root {
            --primary: #4361ee;
            --primary-hover: #3a56d4;
            --bg-body: #f1f4f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
            --radius: 12px;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .app-card { background: var(--card-bg); width: 100%; max-width: 550px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); overflow: hidden; }
        .app-header { background: #fff; padding: 20px 30px; border-bottom: 1px solid var(--border-color); text-align: center; }
        .app-header h2 { margin: 0; font-size: 20px; color: var(--primary); }
        .form-content { padding: 25px 30px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: var(--radius); font-size: 14px; background: #fcfdfe; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-submit { background: var(--primary); color: white; border: none; padding: 14px; border-radius: var(--radius); font-size: 16px; font-weight: 600; width: 100%; cursor: pointer; margin-top: 10px; }
        .hidden { display: none !important; }
        .highlight-box { background: #f8f9ff; padding: 15px; border-radius: 12px; border: 1px solid #e0e7ff; margin-bottom: 18px; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="app-header">
        <h2>Finance Transaction</h2>
        <div style="font-size: 12px; color: #64748b;" id="clock-info"></div>
    </div>

    <div class="form-content">
        <form id="txnForm">
            <input type="hidden" name="time" id="timeField">
            <input type="hidden" name="location" id="locationField">
            <input type="hidden" name="creditcard_name" id="ccName">

            <div class="row">
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" name="date" id="dateField" required>
                </div>
                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number" name="amount" placeholder="0.00" required>
                </div>
            </div>

            <div class="form-group">
                <label>Transaction Type</label>
                <select id="type" name="type" required>
                    <option value="">Select Type</option>
                    <option>Income</option>
                    <option>Expense</option>
                    <option>Self Transfer</option>
                    <option>Receivable</option>
                    <option>Payable</option>
                </select>
            </div>

            <div id="modeSection" class="form-group hidden">
                <label>Mode of Payment</label>
                <select id="mode" name="mode">
                    <option value="">Select Mode</option>
                    <option>Cash</option>
                    <option>UPI</option>
                    <option>Debit Card</option>
                    <option>Credit Card</option>
                    <option>Bank Transfer</option>
                </select>
            </div>

            <div id="categorySection" class="row">
                <div class="form-group">
                    <label>Category</label>
                    <select id="category" name="category" style="width:100%"></select>
                </div>
                <div class="form-group">
                    <label>Sub Category</label>
                    <select id="subcategory" name="subcategory" style="width:100%"></select>
                </div>
            </div>

            <div id="ccWrapper" class="highlight-box hidden">
                <div class="row">
                    <div class="form-group">
                        <label>Select Credit Card</label>
                        <select id="ccSelect" name="creditcard">
                            <option value="">Select Card</option>
                            <option value="4500">Suryoday Bank CC</option>
                            <option value="4500">PhonePe Wish CC</option>
                            <option value="9000">Kotak Dream CC</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Card Limit (₹)</label>
                        <input type="text" id="ccLimit" readonly style="background: #eee;">
                    </div>
                </div>
            </div>

            <div id="loanWrapper" class="form-group hidden">
                <label>Select Loan / EMI</label>
                <select name="emi">
                    <option>HDFC Personal Loan</option>
                    <option>iPhone EMI</option>
                    <option>ExcelR Course EMI</option>
                    <option>Bike Helmet EMI</option>
                </select>
            </div>

            <div class="row" id="accountRow">
                <div id="fromField" class="form-group">
                    <label>From Account</label>
                    <select name="from" id="fromAcc">
                        <option>Cash</option>
                        <option>SBI Bank</option>
                        <option>Jupiter Bank</option>
                        <option>HDFC Bank</option>
                        <option>Kotak Bank</option>
                        <option>IDFC Bank</option>
                    </select>
                </div>
                <div id="toField" class="form-group hidden">
                    <label>To Account</label>
                    <select name="to">
                        <option>Cash</option>
                        <option>SBI Bank</option>
                        <option>Jupiter Bank</option>
                        <option>HDFC Bank</option>
                        <option>Kotak Bank</option>
                        <option>IDFC Bank</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-submit">Save Transaction</button>
        </form>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>
    const transactionData = {
        Income: { "Salary": ["Salary", "Bonus", "Incentives"], "Other": ["Misc"] },
        Expense: {
            "Financial": ["Credit Card Payment", "Loan EMI", "Interest Paid", "Bank Charges"],
            "Food": ["Groceries", "Dining Out"], "Housing": ["Rent", "Electricity"],
            "Transportation": ["Fuel", "Public Transport"] // ... all your previous subcategories go here
        }
    };

    $(document).ready(function() {
        $('#category, #subcategory, #ccSelect, #mode').select2();

        $('#type').change(function() {
            const type = $(this).val();
            
            // Toggle Mode of Payment (Visible only for Expense)
            if(type === "Expense") $('#modeSection').removeClass('hidden');
            else $('#modeSection').addClass('hidden');

            // Category logic
            if (type === "Self Transfer") $('#categorySection').addClass('hidden');
            else $('#categorySection').removeClass('hidden');

            // Dropdown population
            $('#category').empty().append('<option value="">Select Category</option>');
            if(transactionData[type]) {
                Object.keys(transactionData[type]).forEach(cat => $('#category').append(new Option(cat, cat)));
            }

            // Field Reset
            $("#fromField, #toField").hide();
            if(type === "Income") $("#toField").show();
            else if(type === "Expense") $("#fromField").show();
            else if(type === "Self Transfer") { $("#fromField, #toField").show(); }
        });

        $('#mode').change(function() {
            const mode = $(this).val();
            // If Mode is Credit Card, show CC selector
            if(mode === "Credit Card") {
                $('#ccWrapper').removeClass('hidden');
                $('#fromField').addClass('hidden'); // We use CC instead of Bank/Cash
            } else if(mode === "Cash") {
                $('#ccWrapper').addClass('hidden');
                $('#fromField').removeClass('hidden');
                $('#fromAcc').val('Cash').trigger('change'); // Force Cash account
            } else {
                $('#ccWrapper').addClass('hidden');
                $('#fromField').removeClass('hidden');
            }
        });

        $('#subcategory').change(function() {
            const sub = $(this).val();
            // Show Loan EMI selector if subcategory matches
            if(sub === "Loan EMI") $('#loanWrapper').removeClass('hidden');
            else $('#loanWrapper').addClass('hidden');
        });

        $('#ccSelect').change(function() {
            $('#ccLimit').val($(this).val() ? "₹ " + $(this).val() : "");
            $('#ccName').val($("#ccSelect option:selected").text());
        });

        // Submit Logic (Same as before)
        $('#txnForm').submit(function(e) {
            e.preventDefault();
            alert("Saved to Pipeline!");
            this.reset();
            $('#type, #category, #subcategory, #mode, #ccSelect').val(null).trigger('change');
        });
    });
</script>
</body>
</html>
