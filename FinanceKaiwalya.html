<!DOCTYPE html>
<html>

<head>

<title>Finance Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

input,select,textarea,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

button:disabled{
background:#999;
}

.hidden{
display:none;
}

#status{
margin-top:10px;
text-align:center;
font-size:14px;
}

#version{
margin-top:15px;
font-size:12px;
text-align:center;
color:#777;
}

</style>

</head>

<body>

<div class="container">

<h2>Transaction Entry</h2>

<form id="transactionForm">

<label>Date</label>
<input type="date" id="date" required>

<label>Transaction Type</label>
<select id="transactionType" required>

<option value="">Select</option>
<option>Income</option>
<option>Expense</option>
<option>Self Transfer</option>
<option>Receivable</option>
<option>Payable</option>
<option>EMI Payment</option>
<option>Credit Card Payment</option>

</select>


<!-- INCOME SECTION -->

<div id="incomeSection" class="hidden">

<label>Income Category</label>
<select id="incomeCategory">

<option value="">Select Category</option>
<option>Primary Income</option>
<option>Investment Income</option>
<option>Cashback/Rewards</option>
<option>Gifts / Unexpected Income</option>

</select>


<label>Income Amount (INR)</label>
<input type="number" id="incomeAmount" min="1" step="0.01">


<label>Mode of Transaction</label>
<select id="modeTransaction">

<option value="">Select Mode</option>
<option>UPI</option>
<option>Cash</option>
<option>Bank Transfer</option>

</select>


<label>Credited To</label>
<select id="creditedTo">

<option value="">Select Account</option>
<option>SBI Bank</option>
<option>Jupiter Bank</option>
<option>HDFC Bank</option>
<option>Kotak Bank</option>
<option>Digital Wallet</option>
<option>Cash Account</option>

</select>


<div id="walletDescription" class="hidden">

<label>Wallet Name</label>
<textarea id="additionalDescription"
placeholder="Enter wallet name"></textarea>

</div>

</div>


<button id="submitBtn" type="submit">Submit Transaction</button>

<div id="status"></div>

</form>


<div id="version">

Last Updated: 11 Mar 2026  
<br>
Page Loaded: <span id="loadTime"></span>

</div>

</div>


<script>

const form = document.getElementById("transactionForm");
const typeSelect = document.getElementById("transactionType");
const incomeSection = document.getElementById("incomeSection");
const walletSection = document.getElementById("walletDescription");
const creditedTo = document.getElementById("creditedTo");

let locked = false;


/* SHOW INCOME FIELDS */

typeSelect.addEventListener("change", function(){

if(this.value === "Income"){

incomeSection.classList.remove("hidden");

document.getElementById("incomeCategory").required = true;
document.getElementById("incomeAmount").required = true;
document.getElementById("modeTransaction").required = true;
document.getElementById("creditedTo").required = true;

}else{

incomeSection.classList.add("hidden");

}

});


/* WALLET DESCRIPTION REQUIRED */

creditedTo.addEventListener("change", function(){

if(this.value === "Digital Wallet"){

walletSection.classList.remove("hidden");
document.getElementById("additionalDescription").required = true;

}else{

walletSection.classList.add("hidden");
document.getElementById("additionalDescription").required = false;

}

});


/* SUBMIT */

form.addEventListener("submit",function(e){

e.preventDefault();

if(locked) return;

locked = true;

document.getElementById("submitBtn").disabled = true;

document.getElementById("status").innerHTML="Saving...";

navigator.geolocation.getCurrentPosition(function(position){

const payload = {

date:document.getElementById("date").value,
transactionType:typeSelect.value,
incomeCategory:document.getElementById("incomeCategory").value,
incomeAmount:document.getElementById("incomeAmount").value,
mode:document.getElementById("modeTransaction").value,
creditedTo:document.getElementById("creditedTo").value,
description:document.getElementById("additionalDescription").value,
latitude:position.coords.latitude,
longitude:position.coords.longitude,
time:new Date().toLocaleTimeString()

};

fetch("https://script.google.com/macros/s/AKfycbywPW8hrfem5Xq8InNK9aN_8BZzbty5FOkJpTnkbP0zZ6EReTWYPQSxZHffjiSEEPFE/exec",{
method:"POST",
mode:"no-cors",
body:JSON.stringify(payload)
});

form.reset();

document.getElementById("status").innerHTML="✅ Transaction Saved";

});

});


/* PAGE LOAD TIME */

document.getElementById("loadTime").innerText =
new Date().toLocaleString();

</script>

</body>
</html>
