<!DOCTYPE html>
<html>

<head>

<title>Finance Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: 'Segoe UI', sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
text-align:center;
margin-bottom:20px;
}

label{
font-size:13px;
color:#cbd5f5;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:14px;
border-radius:10px;
border:none;
background:#334155;
color:white;
}

input:focus,select:focus{
outline:none;
background:#475569;
}

button{
width:100%;
padding:14px;
background:#3b82f6;
border:none;
border-radius:12px;
font-size:16px;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#2563eb;
}

button:disabled{
background:#64748b;
}

.hidden{
display:none;
}

#status{
text-align:center;
margin-top:10px;
font-size:14px;
}

.footer{
margin-top:15px;
font-size:11px;
text-align:center;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>Finance Tracker</h2>

<form id="transactionForm">

<label>Date</label>
<input type="date" id="date" required>


<label>Transaction Type</label>

<select id="type" required>
<option value="">Select</option>
<option value="Income">Income</option>
<option value="Expense">Expense</option>
</select>


<div id="incomeSection" class="hidden">

<label>Income Category</label>

<select id="incomeCategory">

<option value="">Select</option>
<option>Primary Income</option>
<option>Investment Income</option>
<option>Cashback/Rewards</option>
<option>Gifts / Unexpected Income</option>

</select>

<label>Credited To</label>

<select id="incomeAccount">

<option value="">Select</option>
<option>SBI Bank</option>
<option>Jupiter Bank</option>
<option>HDFC Bank</option>
<option>Kotak Bank</option>
<option>Digital Wallet</option>
<option>Cash Account</option>

</select>

<textarea id="incomeDescription"
placeholder="Wallet name if Digital Wallet"></textarea>

</div>


<div id="expenseSection" class="hidden">

<label>Expense Category</label>

<select id="expenseCategory">

<option value="">Select</option>
<option>Housing / Living</option>
<option>Food & Groceries</option>
<option>Transportation</option>
<option>Health & Medical</option>
<option>Shopping / Lifestyle</option>
<option>Entertainment</option>
<option>Education / Learning</option>
<option>Family Support</option>
<option>Travel</option>
<option>Business / Work Expenses</option>
<option>Miscellaneous</option>

</select>

<label>Expense Sub Category</label>

<select id="expenseSub"></select>

<label>Account</label>

<select id="expenseAccount">

<option value="">Select</option>
<option>SBI Bank</option>
<option>Jupiter Bank</option>
<option>HDFC Bank</option>
<option>Kotak Bank</option>
<option>Cash</option>
<option>Kotak Dream CC</option>
<option>Suryoday Bank Credit Card</option>
<option>PhonePe Wish Card</option>

</select>

<textarea id="expenseDescription"
placeholder="Optional description"></textarea>

</div>


<label>Amount (INR)</label>
<input type="number" id="amount" min="1" required>


<button id="submitBtn">Save Transaction</button>

<div id="status"></div>

</form>

</div>

<div class="footer">

Finance Tracker • Last Updated 2026

</div>

</div>


<script>

const scriptURL="YOUR_SCRIPT_URL";

const type=document.getElementById("type");

const incomeSection=document.getElementById("incomeSection");
const expenseSection=document.getElementById("expenseSection");

let locked=false;


/* show sections */

type.addEventListener("change",function(){

incomeSection.classList.add("hidden");
expenseSection.classList.add("hidden");

if(this.value==="Income"){
incomeSection.classList.remove("hidden");
}

if(this.value==="Expense"){
expenseSection.classList.remove("hidden");
}

});


/* sub category mapping */

const subMap={

"Housing / Living":[
"Rent","Maintenance","Electricity Bill","Water Bill","Gas Cylinder",
"Internet / Broadband","Mobile Recharge","House Repairs","Furniture"
],

"Food & Groceries":[
"Groceries","Fruits & Vegetables","Dairy Products","Snacks",
"Dining Out","Online Food Orders"
],

"Transportation":[
"Fuel / Petrol","Public Transport","Cab / Auto","Bike Maintenance",
"Car Maintenance","Parking Charges","Toll Charges"
]

};


document.getElementById("expenseCategory")
.addEventListener("change",function(){

const sub=document.getElementById("expenseSub");

sub.innerHTML="";

(subMap[this.value]||[]).forEach(item=>{

let o=document.createElement("option");

o.text=item;

sub.add(o);

});

});


/* submit */

document.getElementById("transactionForm")
.addEventListener("submit",function(e){

e.preventDefault();

if(locked) return;

locked=true;

document.getElementById("submitBtn").disabled=true;

document.getElementById("status").innerText="Saving...";

navigator.geolocation.getCurrentPosition(function(pos){

const payload={

date:document.getElementById("date").value,
transactionType:type.value,

incomeCategory:document.getElementById("incomeCategory").value,

expenseCategory:document.getElementById("expenseCategory").value,
expenseSubCategory:document.getElementById("expenseSub").value,

amount:document.getElementById("amount").value,

account:
document.getElementById("incomeAccount").value ||
document.getElementById("expenseAccount").value,

description:
document.getElementById("incomeDescription").value ||
document.getElementById("expenseDescription").value,

latitude:pos.coords.latitude,
longitude:pos.coords.longitude,

time:new Date().toLocaleTimeString()

};

fetch(scriptURL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify(payload)
});

document.getElementById("status").innerText="Transaction Saved";

document.getElementById("transactionForm").reset();

});

});

</script>

</body>
</html>
