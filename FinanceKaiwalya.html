<!DOCTYPE html>
<html>
<head>

<title>Finance Transaction Entry</title>

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:30px;
}

.container{
background:white;
padding:25px;
border-radius:10px;
max-width:700px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

label{
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

button{
background:#2b7cff;
color:white;
padding:12px;
border:none;
border-radius:6px;
width:100%;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1f5fd4;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Finance Transaction Entry</h2>

<form id="txnForm">

<label>Date</label>
<input type="date" name="date" required>

<label>Time</label>
<input type="time" name="time">

<label>Location</label>
<input type="text" name="location">

<label>Transaction Type</label>
<select id="type" name="type" required>

<option value="">Select</option>
<option>Income</option>
<option>Expense</option>
<option>Self Transfer</option>
<option>Receivable</option>
<option>Payable</option>

</select>

<label>Category</label>
<select id="category" name="category" style="width:100%"></select>

<label>Sub Category</label>
<select id="subcategory" name="subcategory" style="width:100%"></select>

<label>Amount</label>
<input type="number" name="amount" required>

<div id="fromField">

<label>From Account</label>

<select name="from">

<option>Cash</option>
<option>SBI Bank</option>
<option>Jupiter Bank</option>
<option>HDFC Bank</option>
<option>Kotak Bank</option>
<option>IDFC Bank</option>

</select>

</div>

<div id="toField">

<label>To Account</label>

<select name="to">

<option>Cash</option>
<option>SBI Bank</option>
<option>Jupiter Bank</option>
<option>HDFC Bank</option>
<option>Kotak Bank</option>
<option>IDFC Bank</option>

</select>

</div>

<div id="creditCardField" class="hidden">

<label>Credit Card</label>

<select name="creditcard">

<option>Suryoday Bank CC</option>
<option>PhonePe Wish CC</option>
<option>Kotak Dream CC</option>

</select>

</div>

<div id="emiField" class="hidden">

<label>EMI Name</label>

<select name="emi">

<option>HDFC Personal Loan</option>
<option>iPhone EMI</option>
<option>ExcelR Course EMI</option>
<option>Bike Helmet EMI</option>

</select>

</div>

<label>Description</label>
<textarea name="notes"></textarea>

<button type="submit">Submit Transaction</button>

</form>

</div>


<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>


<script>

$('#category').select2({placeholder:"Search Category"});
$('#subcategory').select2({placeholder:"Search Sub Category"});


var data = {

Income:{
"Salary":["Salary","Bonus","Incentives","Overtime"],
"Freelance":["Freelance Projects","Consulting","Part Time Work","Online Services"],
"Business":["Product Sales","Service Revenue","Online Store Sales","Commission Income"],
"Investment":["Stock Dividends","Mutual Fund Dividends","FD Interest","Savings Account Interest","Bond Interest"],
"Rental":["Rent Received","Parking Rent"],
"Rewards":["Credit Card Cashback","UPI Cashback","Reward Points Redemption"],
"Refund":["Purchase Refund","Expense Reimbursement","Insurance Claim","Tax Refund"],
"Gift":["Gifts Received","Family Support","Prize / Lottery"],
"Other":["Miscellaneous Income"]
},

Expense:{
"Housing":["Rent","Maintenance Charges","Electricity Bill","Water Bill","Gas Cylinder","House Repairs","Furniture"],
"Utilities":["Mobile Recharge","Internet / Broadband","Software Subscription"],
"Food":["Groceries","Fruits & Vegetables","Dairy Products","Snacks","Dining Out","Online Food Orders"],
"Transportation":["Fuel","Public Transport","Cab / Auto","Parking Charges","Toll Charges","Bike Maintenance","Car Maintenance"],
"Health":["Doctor Consultation","Medicines","Medical Tests","Health Insurance","Supplements","Gym / Fitness"],
"Shopping":["Clothes","Shoes","Accessories","Electronics","Personal Care","Salon / Grooming"],
"Entertainment":["Movies","OTT Subscriptions","Music Subscription","Games","Outings"],
"Education":["Courses","Books","Certifications","Workshops"],
"Financial":["Credit Card Payment","Loan EMI","Interest Paid","Bank Charges","Late Fees"],
"Family":["Parents Support","Brother Support","Family Gifts"],
"Travel":["Flight Tickets","Train Tickets","Hotel Booking","Local Transport","Trip Activities"],
"Business":["Office Supplies","Marketing","Work Software","Business Expenses"],
"Donation":["Charity","Religious Donations"],
"Other":["Miscellaneous Expense","Unexpected Expense","Penalties","Tips"]

}

};


$('#type').change(function(){

var type = $(this).val();

$('#category').empty();
$('#subcategory').empty();

if(data[type]){

Object.keys(data[type]).forEach(function(cat){

$('#category').append(new Option(cat,cat));

});

}

});


$('#category').change(function(){

var type = $('#type').val();
var cat = $(this).val();

$('#subcategory').empty();

data[type][cat].forEach(function(sub){

$('#subcategory').append(new Option(sub,sub));

});

});


$('#subcategory').change(function(){

var sub = $(this).val();

if(sub=="Credit Card Payment")
$("#creditCardField").removeClass("hidden");
else
$("#creditCardField").addClass("hidden");


if(sub=="Loan EMI")
$("#emiField").removeClass("hidden");
else
$("#emiField").addClass("hidden");

});


$('#type').change(function(){

var type = $(this).val();

if(type=="Income"){

$("#fromField").hide();
$("#toField").show();

}

else if(type=="Expense"){

$("#fromField").show();
$("#toField").hide();

}

else{

$("#fromField").show();
$("#toField").show();

}

});

</script>

</body>
</html>
