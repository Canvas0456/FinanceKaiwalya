<!DOCTYPE html>
<html>

<head>

<title>Finance Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
background:#f4f6f8;
padding:20px;
}

.container{
max-width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

</style>

</head>

<body>

<div class="container">

<h2>Transaction Entry</h2>

<form id="transactionForm">

<label>Date</label>
<input type="date" id="date" required>

<label>Transaction Type</label>

<select id="transactionType" required>

<option value="">Select Type</option>
<option value="Income">Income</option>
<option value="Expense">Expense</option>
<option value="Self Transfer">Self Transfer</option>
<option value="Receivable">Receivable (Money Lent)</option>
<option value="Payable">Payable (Money Owed)</option>
<option value="EMI Payment">EMI Payment</option>
<option value="Credit Card Payment">Credit Card Payment</option>

</select>

<button type="submit">Submit Transaction</button>

</form>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbywPW8hrfem5Xq8InNK9aN_8BZzbty5FOkJpTnkbP0zZ6EReTWYPQSxZHffjiSEEPFE/exec";

document.getElementById("transactionForm").addEventListener("submit", function(e){

e.preventDefault();

const date = document.getElementById("date").value;
const type = document.getElementById("transactionType").value;

if(!date || !type){
alert("Please fill all fields");
return;
}

if (!navigator.geolocation){
alert("Geolocation is not supported by your browser");
return;
}

navigator.geolocation.getCurrentPosition(function(position){

const latitude = position.coords.latitude;
const longitude = position.coords.longitude;

const data = {

date: date,
time: new Date().toLocaleTimeString(),
location: latitude + "," + longitude,
latitude: latitude,
longitude: longitude,
transactionType: type

};

fetch(scriptURL, {

method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)

})
.then(response => response.text())
.then(data => {

alert("Transaction Saved Successfully ✅");

document.getElementById("transactionForm").reset();

})
.catch(error => {

alert("Error submitting form ❌");

console.error(error);

});

}, function(){

alert("Please allow location access");

});

});

</script>

</body>

</html>
