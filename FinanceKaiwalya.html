<!DOCTYPE html>
<html>

<head>

<title>Finance Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:20px;
}

.container{
max-width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

button:disabled{
background:#999;
cursor:not-allowed;
}

#status{
margin-top:10px;
text-align:center;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h2>Transaction Entry</h2>

<form id="transactionForm">

<label>Date</label>
<input type="date" id="date" required>

<label>Transaction Type</label>

<select id="transactionType" required>

<option value="">Select</option>
<option>Income</option>
<option>Expense</option>
<option>Self Transfer</option>
<option>Receivable (Money Lent)</option>
<option>Payable (Money Owed)</option>
<option>EMI Payment</option>
<option>Credit Card Payment</option>

</select>

<button id="submitBtn" type="submit">Submit Transaction</button>

<div id="status"></div>

</form>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbywPW8hrfem5Xq8InNK9aN_8BZzbty5FOkJpTnkbP0zZ6EReTWYPQSxZHffjiSEEPFE/exec";

const form = document.getElementById("transactionForm");
const submitBtn = document.getElementById("submitBtn");
const statusDiv = document.getElementById("status");

let isSubmitting = false;

form.addEventListener("submit", function(e){

e.preventDefault();

/* stop multiple submissions */
if(isSubmitting) return;

isSubmitting = true;

submitBtn.disabled = true;

statusDiv.innerHTML = "Saving transaction...";

/* collect values */

const date = document.getElementById("date").value;
const type = document.getElementById("transactionType").value;

/* capture location */

navigator.geolocation.getCurrentPosition(function(position){

const payload = {

date: date,
time: new Date().toLocaleTimeString(),
location: position.coords.latitude + "," + position.coords.longitude,
latitude: position.coords.latitude,
longitude: position.coords.longitude,
transactionType: type

};

/* clear form immediately */

form.reset();

/* send data */

fetch(scriptURL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify(payload)
})

.then(()=>{

statusDiv.innerHTML = "✅ Transaction Saved";

})
.catch(()=>{

statusDiv.innerHTML = "❌ Error Saving";

})
.finally(()=>{

setTimeout(()=>{

submitBtn.disabled = false;
isSubmitting = false;
statusDiv.innerHTML = "";

},2000);

});

},
function(){

statusDiv.innerHTML = "Location permission required";

submitBtn.disabled = false;
isSubmitting = false;

});

});

</script>

</body>

</html>
