<!DOCTYPE html>
<html>

<head>

<title>Finance Transaction Entry</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<style>

body{
font-family:'Inter',sans-serif;
background:#f5f7fb;
margin:0;
display:flex;
flex-direction:column;
min-height:100vh;
}

.header{
text-align:center;
padding:20px;
font-size:16px;
font-weight:500;
color:#333;
}

#clock{
font-weight:600;
color:#0066ff;
}

.container{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.card{

max-width:750px;
width:100%;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);

}

h2{
text-align:center;
margin-bottom:25px;
}

label{
font-weight:500;
}

input,select,textarea{

width:100%;
padding:10px;
margin-top:6px;
margin-bottom:18px;
border-radius:6px;
border:1px solid #ddd;
font-size:14px;

}

button{

background:#0066ff;
color:white;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
width:100%;
cursor:pointer;

}

button:hover{
background:#004bcc;
}

.row{
display:flex;
gap:15px;
}

.col{
flex:1;
}

.hidden{
display:none;
}

.success{
text-align:center;
color:green;
font-weight:bold;
display:none;
margin-bottom:15px;
}

.footer{
text-align:center;
padding:15px;
font-size:13px;
color:#777;
}

</style>

</head>

<body>

<div class="header">

<div id="dayDate"></div>
<div id="clock"></div>

</div>

<div class="container">

<div class="card">

<h2>Finance Transaction Entry</h2>

<div class="success" id="successMsg">
Transaction Saved Successfully
</div>

<form id="txnForm">

<div class="row">

<div class="col">
<label>Date</label>
<input type="date" name="date" required>
</div>

<div class="col">
<label>Time (Now)</label>
<input type="text" name="time" id="timeField" readonly>
</div>

</div>

<label>Location (GPS)</label>
<input type="text" name="location" id="locationField" readonly>

<label>Transaction Type</label>

<select id="type" name="type" required>

<option value="">Select</option>
<option>Income</option>
<option>Expense</option>
<option>Self Transfer</option>
<option>Receivable</option>
<option>Payable</option>

</select>

<label>Category</label>
<select id="category" style="width:100%"></select>

<label>Sub Category</label>
<select id="subcategory" style="width:100%"></select>

<label>Amount (₹)</label>
<input type="number" name="amount" required>

<div id="personField" class="hidden">
<label>Person Name</label>
<input type="text" name="person">
</div>

<div id="fromField">
<label>From Account</label>

<select name="from">
<option>Cash</option>
<option>SBI Bank</option>
<option>Jupiter Bank</option>
<option>HDFC Bank</option>
<option>Kotak Bank</option>
<option>IDFC Bank</option>
</select>

</div>

<div id="toField">
<label>To Account</label>

<select name="to">
<option>Cash</option>
<option>SBI Bank</option>
<option>Jupiter Bank</option>
<option>HDFC Bank</option>
<option>Kotak Bank</option>
<option>IDFC Bank</option>
</select>

</div>

<div id="creditCardField" class="hidden">

<label>Credit Card</label>

<select name="creditcard">
<option>Suryoday Bank CC</option>
<option>PhonePe Wish CC</option>
<option>Kotak Dream CC</option>
</select>

</div>

<div id="emiField" class="hidden">

<label>EMI Name</label>

<select name="emi">
<option>HDFC Personal Loan</option>
<option>iPhone EMI</option>
<option>ExcelR Course EMI</option>
<option>Bike Helmet EMI</option>
</select>

</div>

<label>Description</label>
<textarea name="notes"></textarea>

<button type="submit">Save Transaction</button>

</form>

</div>

</div>

<div class="footer">
Copyright@KaiwalyaMuley
</div>

<script>

$('#category').select2({placeholder:"Search Category"});
$('#subcategory').select2({placeholder:"Search Sub Category"});

function updateClock(){

const now=new Date();

const options={weekday:'long',year:'numeric',month:'long',day:'numeric'};

document.getElementById("dayDate").innerHTML=
now.toLocaleDateString('en-IN',options);

document.getElementById("clock").innerHTML=
now.toLocaleTimeString('en-IN');

document.getElementById("timeField").value=
now.toLocaleTimeString('en-IN');

}

setInterval(updateClock,1000);
updateClock();


function getLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(position){

let lat=position.coords.latitude;
let lon=position.coords.longitude;

document.getElementById("locationField").value=
lat.toFixed(5)+", "+lon.toFixed(5);

});

}

}

getLocation();


var data={

Income:{

"Salary":["Salary","Bonus","Incentives","Overtime"],

"Freelance":["Freelance Projects","Consulting","Part Time Work","Online Services"],

"Business":["Product Sales","Service Revenue","Online Store Sales","Commission Income"],

"Investment":["Stock Dividends","Mutual Fund Dividends","FD Interest","Savings Account Interest","Bond Interest"],

"Rental":["Rent Received","Parking Rent"],

"Rewards":["Credit Card Cashback","UPI Cashback","Reward Points Redemption"],

"Refund":["Purchase Refund","Expense Reimbursement","Insurance Claim","Tax Refund"],

"Gift":["Gifts Received","Family Support","Prize / Lottery"],

"Other":["Miscellaneous Income"]

},

Expense:{

"Housing":["Rent","Maintenance Charges","Electricity Bill","Water Bill","Gas Cylinder","House Repairs","Furniture"],

"Utilities":["Mobile Recharge","Internet / Broadband","Software Subscription"],

"Food":["Groceries","Fruits & Vegetables","Dairy Products","Snacks","Dining Out","Online Food Orders"],

"Transportation":["Fuel","Public Transport","Cab / Auto","Parking Charges","Toll Charges","Bike Maintenance","Car Maintenance"],

"Health":["Doctor Consultation","Medicines","Medical Tests","Health Insurance","Supplements","Gym / Fitness"],

"Shopping":["Clothes","Shoes","Accessories","Electronics","Personal Care","Salon / Grooming"],

"Entertainment":["Movies","OTT Subscriptions","Music Subscription","Games","Outings"],

"Education":["Courses","Books","Certifications","Workshops"],

"Financial":["Credit Card Payment","Loan EMI","Interest Paid","Bank Charges","Late Fees"],

"Family":["Parents Support","Brother Support","Family Gifts"],

"Travel":["Flight Tickets","Train Tickets","Hotel Booking","Local Transport","Trip Activities"],

"Business":["Office Supplies","Marketing","Work Software","Business Expenses"],

"Donation":["Charity","Religious Donations"],

"Other":["Miscellaneous Expense","Unexpected Expense","Penalties","Tips"]

}

};

$('#type').change(function(){

var type=$(this).val();

$('#category').empty();
$('#subcategory').empty();

if(data[type]){

Object.keys(data[type]).forEach(function(cat){

$('#category').append(new Option(cat,cat));

});

}

if(type=="Income"){

$("#fromField").hide();
$("#toField").show();
$("#personField").hide();

}

else if(type=="Expense"){

$("#fromField").show();
$("#toField").hide();
$("#personField").hide();

}

else if(type=="Self Transfer"){

$("#fromField").show();
$("#toField").show();
$("#personField").hide();

}

else if(type=="Receivable"){

$("#fromField").hide();
$("#toField").show();
$("#personField").show();

}

else if(type=="Payable"){

$("#fromField").show();
$("#toField").hide();
$("#personField").show();

}

});

$('#category').change(function(){

var type=$('#type').val();
var cat=$(this).val();

$('#subcategory').empty();

data[type][cat].forEach(function(sub){

$('#subcategory').append(new Option(sub,sub));

});

});

$('#subcategory').change(function(){

var sub=$(this).val();

if(sub=="Credit Card Payment")
$("#creditCardField").removeClass("hidden");
else
$("#creditCardField").addClass("hidden");

if(sub=="Loan EMI")
$("#emiField").removeClass("hidden");
else
$("#emiField").addClass("hidden");

});

$('#txnForm').submit(function(e){

e.preventDefault();

$('#successMsg').show();

setTimeout(function(){

$('#successMsg').hide();

},3000);

this.reset();

});

</script>

</body>
</html>
