<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow | Transaction Entry</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>
    
    <style>
        :root {
            --primary: #4361ee;
            --primary-hover: #3a56d4;
            --bg-body: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        /* Header Styling */
        .app-header {
            background: linear-gradient(135deg, #4361ee, #7209b7);
            padding: 30px;
            color: white;
            text-align: center;
        }

        .app-header h2 { margin: 0; font-size: 24px; font-weight: 700; }
        
        #clock-container {
            margin-top: 10px;
            font-size: 0.9rem;
            opacity: 0.9;
            background: rgba(255, 255, 255, 0.15);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        /* Form Styling */
        .form-content { padding: 30px; }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 15px;
            outline: none;
            background: #fff;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1);
        }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* Customizing Select2 to look modern */
        .select2-container--default .select2-selection--single {
            height: 45px;
            border: 1.5px solid var(--border-color);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
        }

        /* Action Button */
        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            background: var(--primary-hover);
        }

        /* Success Message */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        .hidden { display: none; }
        .footer { text-align: center; margin-top: 20px; color: var(--text-muted); font-size: 12px; }

        /* Responsive */
        @media (max-width: 480px) {
            .row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="successToast" class="toast">
    <i class="fas fa-check-circle"></i> Transaction Saved Successfully!
</div>

<div class="app-card">
    <div class="app-header">
        <h2>FinanceFlow</h2>
        <div id="clock-container">
            <i class="far fa-calendar-alt"></i> <span id="dayDate"></span> | 
            <i class="far fa-clock"></i> <span id="clock"></span>
        </div>
    </div>

    <div class="form-content">
        <form id="txnForm">
            <div class="row">
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" name="date" id="dateField" required>
                </div>
                <div class="form-group">
                    <label>Time</label>
                    <input type="text" name="time" id="timeField" readonly style="background: #f1f5f9;">
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-map-marker-alt"></i> Location</label>
                <input type="text" name="location" id="locationField" readonly placeholder="Fetching GPS..." style="background: #f1f5f9;">
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Type</label>
                    <select id="type" name="type" required>
                        <option value="">Select Type</option>
                        <option>Income</option>
                        <option>Expense</option>
                        <option>Self Transfer</option>
                        <option>Receivable</option>
                        <option>Payable</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number" name="amount" placeholder="0.00" required>
                </div>
            </div>

            <div class="form-group">
                <label>Category</label>
                <select id="category" name="category" style="width:100%"></select>
            </div>

            <div class="form-group">
                <label>Sub Category</label>
                <select id="subcategory" name="subcategory" style="width:100%"></select>
            </div>

            <div id="personField" class="form-group hidden">
                <label>Person Name</label>
                <input type="text" name="person" placeholder="Enter name">
            </div>

            <div class="row">
                <div id="fromField" class="form-group">
                    <label>From Account</label>
                    <select name="from">
                        <option>Cash</option>
                        <option>SBI Bank</option>
                        <option>Jupiter Bank</option>
                        <option>HDFC Bank</option>
                    </select>
                </div>
                <div id="toField" class="form-group">
                    <label>To Account</label>
                    <select name="to">
                        <option>Cash</option>
                        <option>SBI Bank</option>
                        <option>Jupiter Bank</option>
                        <option>HDFC Bank</option>
                    </select>
                </div>
            </div>

            <div id="creditCardField" class="form-group hidden">
                <label>Credit Card</label>
                <select name="creditcard">
                    <option>Suryoday Bank CC</option>
                    <option>PhonePe Wish CC</option>
                    <option>Kotak Dream CC</option>
                </select>
            </div>

            <div id="emiField" class="form-group hidden">
                <label>EMI Name</label>
                <select name="emi">
                    <option>HDFC Personal Loan</option>
                    <option>iPhone EMI</option>
                </select>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="notes" rows="2" placeholder="Add a note..."></textarea>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-paper-plane"></i> Save Transaction
            </button>
        </form>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>
    // Configuration Data (Kept from your original logic)
    const data = {
        Income: {
            "Salary": ["Salary", "Bonus", "Incentives"],
            "Freelance": ["Projects", "Consulting"],
            "Investment": ["Dividends", "FD Interest"],
            "Other": ["Misc Income"]
        },
        Expense: {
            "Housing": ["Rent", "Electricity", "Water"],
            "Food": ["Groceries", "Dining Out", "Swiggy/Zomato"],
            "Transportation": ["Fuel", "Cab", "Maintenance"],
            "Financial": ["Credit Card Payment", "Loan EMI"],
            "Other": ["Miscellaneous"]
        }
    };

    $(document).ready(function() {
        // Initialize Select2
        $('#category, #subcategory').select2();

        // Clock & Date Logic
        function updateClock() {
            const now = new Date();
            const dateOpts = { weekday: 'short', month: 'short', day: 'numeric' };
            $('#dayDate').text(now.toLocaleDateString('en-IN', dateOpts));
            $('#clock').text(now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' }));
            $('#timeField').val(now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' }));
            
            if(!$('#dateField').val()) {
                const today = now.toISOString().split('T')[0];
                $('#dateField').val(today);
            }
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Location Logic
        if(navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                $('#locationField').val(`${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`);
            });
        }

        // Logic for Field Toggling
        $('#type').change(function() {
            const val = $(this).val();
            $('#category').empty().append('<option value="">Select Category</option>');
            
            if(data[val]) {
                Object.keys(data[val]).forEach(cat => {
                    $('#category').append(new Option(cat, cat));
                });
            }

            // UI Adjustments based on type
            $("#fromField, #toField, #personField").hide();
            if(val === "Income") $("#toField").show();
            else if(val === "Expense") $("#fromField").show();
            else if(val === "Self Transfer") { $("#fromField").show(); $("#toField").show(); }
            else if(val === "Receivable") { $("#toField").show(); $("#personField").show(); }
            else if(val === "Payable") { $("#fromField").show(); $("#personField").show(); }
        });

        $('#category').change(function() {
            const type = $('#type').val();
            const cat = $(this).val();
            $('#subcategory').empty();
            if(data[type] && data[type][cat]) {
                data[type][cat].forEach(sub => $('#subcategory').append(new Option(sub, sub)));
            }
        });

        $('#subcategory').change(function() {
            const sub = $(this).val();
            sub === "Credit Card Payment" ? $("#creditCardField").removeClass("hidden") : $("#creditCardField").addClass("hidden");
            sub === "Loan EMI" ? $("#emiField").removeClass("hidden") : $("#emiField").addClass("hidden");
        });

        // Submit Handler
        $('#txnForm').submit(function(e) {
            e.preventDefault();
            $('#successToast').fadeIn().delay(3000).fadeOut();
            this.reset();
            updateClock();
        });
    });
</script>

</body>
</html>
