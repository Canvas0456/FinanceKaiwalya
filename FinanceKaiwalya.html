<!DOCTYPE html>
<html>

<head>

<title>Finance Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

h2{
text-align:center;
margin-bottom:20px;
}

label{
font-size:13px;
color:#cbd5f5;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:14px;
border-radius:10px;
border:none;
background:#334155;
color:white;
}

button{
width:100%;
padding:14px;
background:#3b82f6;
border:none;
border-radius:10px;
font-size:16px;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.hidden{
display:none;
}

.footer{
text-align:center;
margin-top:15px;
font-size:11px;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>Finance Tracker</h2>

<form id="form">

<label>Date</label>
<input type="date" id="date" required>

<label>Transaction Type</label>

<select id="type" required>

<option value="">Select</option>
<option value="Income">Income</option>
<option value="Expense">Expense</option>
<option value="Transfer">Self Transfer</option>

</select>


<div id="categorySection" class="hidden">

<label>Category</label>
<select id="category"></select>

<label>Sub Category</label>
<select id="subcategory"></select>

</div>


<div id="accountSection" class="hidden">

<label>Account</label>
<select id="account"></select>

</div>


<div id="transferSection" class="hidden">

<label>From Account</label>
<select id="fromAccount"></select>

<label>To Account</label>
<select id="toAccount"></select>

</div>


<label>Amount (INR)</label>
<input type="number" id="amount" min="1" required>


<label>Description</label>
<textarea id="description"></textarea>


<button id="submitBtn">Save Transaction</button>

<div id="status"></div>

</form>

</div>

<div class="footer">
Finance Tracker
</div>

</div>


<script>

/* CATEGORY MAP */

const incomeCategories={
"Salary":["Salary","Bonus","Incentives","Overtime"],
"Freelance":["Freelance Projects","Consulting","Part Time Work","Online Services"],
"Investment":["Stock Dividends","Mutual Fund Dividends","FD Interest","Savings Account Interest","Bond Interest"],
"Rental":["Rent Received","Parking Rent"],
"Rewards":["Credit Card Cashback","UPI Cashback","Reward Points Redemption"],
"Refund":["Purchase Refund","Expense Reimbursement","Insurance Claim","Tax Refund"],
"Gift":["Gifts Received","Family Support","Prize / Lottery"],
"Other":["Miscellaneous Income"]
};

const expenseCategories={
"Housing":["Rent","Maintenance Charges","Electricity Bill","Water Bill","Gas Cylinder","House Repairs","Furniture"],
"Utilities":["Mobile Recharge","Internet / Broadband","Software Subscription"],
"Food":["Groceries","Fruits & Vegetables","Dairy Products","Snacks","Dining Out","Online Food Orders"],
"Transportation":["Fuel","Public Transport","Cab / Auto","Parking Charges","Toll Charges","Bike Maintenance","Car Maintenance"],
"Health":["Doctor Consultation","Medicines","Medical Tests","Health Insurance","Supplements","Gym / Fitness"],
"Shopping":["Clothes","Shoes","Accessories","Electronics","Personal Care","Salon / Grooming"],
"Entertainment":["Movies","OTT Subscriptions","Music Subscription","Games","Outings"],
"Education":["Courses","Books","Certifications","Workshops"],
"Financial":["Credit Card Payment","Loan EMI","Interest Paid","Bank Charges","Late Fees"],
"Family":["Parents Support","Brother Support","Family Gifts"],
"Travel":["Flight Tickets","Train Tickets","Hotel Booking","Local Transport","Trip Activities"],
"Business":["Office Supplies","Marketing","Work Software","Business Expenses"],
"Donation":["Charity","Religious Donations"],
"Other":["Miscellaneous Expense","Unexpected Expense","Penalties","Tips"]
};


/* ACCOUNTS */

const accounts=[
"SBI Bank",
"Jupiter Bank",
"HDFC Bank",
"Kotak Bank",
"IDFC Bank",
"Suryoday Bank CC",
"PhonePe Wish CC",
"Kotak Dream CC"
];


/* ELEMENTS */

const type=document.getElementById("type");
const category=document.getElementById("category");
const sub=document.getElementById("subcategory");

const categorySection=document.getElementById("categorySection");
const accountSection=document.getElementById("accountSection");
const transferSection=document.getElementById("transferSection");


/* TYPE CHANGE */

type.addEventListener("change",()=>{

categorySection.classList.add("hidden");
accountSection.classList.add("hidden");
transferSection.classList.add("hidden");

category.innerHTML="";
sub.innerHTML="";

if(type.value==="Income"){

categorySection.classList.remove("hidden");
accountSection.classList.remove("hidden");

Object.keys(incomeCategories).forEach(c=>{
let o=document.createElement("option");
o.text=c;
category.add(o);
});

populateAccounts("account");

}

if(type.value==="Expense"){

categorySection.classList.remove("hidden");
accountSection.classList.remove("hidden");

Object.keys(expenseCategories).forEach(c=>{
let o=document.createElement("option");
o.text=c;
category.add(o);
});

populateAccounts("account");

}

if(type.value==="Transfer"){

transferSection.classList.remove("hidden");

populateAccounts("fromAccount");
populateAccounts("toAccount");

}

});


/* SUB CATEGORY */

category.addEventListener("change",()=>{

sub.innerHTML="";

let map=(type.value==="Income") ? incomeCategories : expenseCategories;

(map[category.value]||[]).forEach(s=>{

let o=document.createElement("option");
o.text=s;
sub.add(o);

});

});


function populateAccounts(id){

let el=document.getElementById(id);

el.innerHTML="";

accounts.forEach(a=>{
let o=document.createElement("option");
o.text=a;
el.add(o);
});

}


/* SUBMIT */

document.getElementById("form").addEventListener("submit",function(e){

e.preventDefault();

document.getElementById("submitBtn").disabled=true;

navigator.geolocation.getCurrentPosition(function(pos){

const payload={

date:document.getElementById("date").value,
transactionType:type.value,

category:category.value,
subcategory:sub.value,

account:document.getElementById("account")?.value,

fromAccount:document.getElementById("fromAccount")?.value,
toAccount:document.getElementById("toAccount")?.value,

amount:document.getElementById("amount").value,
description:document.getElementById("description").value,

latitude:pos.coords.latitude,
longitude:pos.coords.longitude,
time:new Date().toLocaleTimeString()

};

fetch("YOUR_SCRIPT_URL",{
method:"POST",
mode:"no-cors",
body:JSON.stringify(payload)
});

document.getElementById("status").innerText="Transaction Saved";

document.getElementById("form").reset();

});

});

</script>

</body>
</html>
